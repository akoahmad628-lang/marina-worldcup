<!doctype html><html lang="ku" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Past Winners • Marina World Cup</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--navy:#0b1f36;--orange:#f28c28;--green:#0f8b5f;--dark:#071421}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,var(--navy),#071421);color:white}.top{background:rgba(7,20,33,.86);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.12)}.nav{max-width:1100px;margin:auto;padding:14px;display:flex;justify-content:space-between;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--orange),var(--green));display:inline-grid;place-items:center;font-weight:900;color:var(--navy);margin-left:10px}.links{display:flex;gap:8px;flex-wrap:wrap}.pill{padding:9px 13px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(255,255,255,.08);font-size:13px}a{color:inherit;text-decoration:none}.wrap{max-width:1100px;margin:auto;padding:34px 14px}.hero{text-align:center;margin-bottom:24px}.hero h1{font-size:clamp(34px,5vw,58px);margin:0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}.card{background:rgba(255,255,255,.95);color:var(--dark);border-radius:24px;padding:18px;box-shadow:0 15px 45px rgba(0,0,0,.22)}.teams{text-align:center;font-size:20px;font-weight:900}.winner{background:linear-gradient(135deg,var(--green),var(--navy));color:white;border-radius:18px;padding:16px;margin-top:12px}.footer{background:#06101d;border-top:1px solid rgba(255,255,255,.12);padding:30px 16px;text-align:center}.social{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:15px 0}.social a{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:12px 16px;border-radius:18px}.hash{color:var(--orange);font-weight:900;font-size:18px}
</style></head><body><header class="top"><div class="nav"><a href="index.html"><span class="logo">M</span><b>Marina World Cup 2026</b></a><div class="links"><a class="pill" href="index.html">Tonight's Games</a><a class="pill" href="admin.html">Admin</a></div></div></header><main class="wrap"><div class="hero"><h1>Past Winners</h1><p>براوەکانی یارییەکانی پێشوو</p></div><div id="list" class="grid"></div></main><footer class="footer"><div class="hash">#MarinaWorldCup2026</div><div class="social"><a href="https://www.instagram.com/marina__suli?igsh=azhmbWJ2amxhM2xr" target="_blank">📸 Instagram</a><a href="https://www.facebook.com/share/1BZJ3VkDwW/?mibextid=wwXIfr" target="_blank">📘 Facebook</a><a href="https://www.tiktok.com/@marina.suli?_r=1&_t=ZS-978GcpWbCSN" target="_blank">🎵 TikTok</a></div></footer><script>
const SUPABASE_URL='PASTE_SUPABASE_URL_HERE'; const SUPABASE_ANON_KEY='PASTE_SUPABASE_ANON_KEY_HERE';
const db = (SUPABASE_URL.includes('PASTE')) ? null : supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
async function load(){if(!db){list.innerHTML='<div class="card">Add Supabase URL and anon key first.</div>';return} const {data:w}=await db.from('winners').select('*, games(*)').order('created_at',{ascending:false}); list.innerHTML=(w||[]).map(x=>`<div class="card"><div class="teams">${x.games?.flag1||''} ${x.games?.team1||''} vs ${x.games?.flag2||''} ${x.games?.team2||''}</div><p>${x.games?.match_date||''}</p><div class="winner"><b>🎉 ${x.winner_name}</b><br>${x.apartment_code||''}${x.prize?`<br>🎁 ${x.prize}`:''}</div></div>`).join('')||'<div class="card">No winners published yet.</div>'}
if(db){db.channel('winnerslive').on('postgres_changes',{event:'*',schema:'public'},load).subscribe();} load();
</script></body></html>
