<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin • Marina World Cup</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--navy:#0b1f36;--orange:#f28c28;--green:#0f8b5f;--gray:#eef2f5;--dark:#071421}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#eef2f5;color:#071421}.top{background:linear-gradient(135deg,var(--navy),#071421);color:white;padding:18px}.nav{max-width:1200px;margin:auto;display:flex;justify-content:space-between;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--orange),var(--green));display:inline-grid;place-items:center;font-weight:900;color:var(--navy);margin-right:10px}.wrap{max-width:1200px;margin:auto;padding:22px 14px}.card{background:white;border-radius:22px;padding:18px;margin:15px 0;box-shadow:0 10px 35px rgba(2,6,23,.08)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}input,select{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:14px;font-size:15px}.btn{border:0;border-radius:14px;padding:12px 14px;font-weight:900;background:linear-gradient(135deg,var(--orange),#ffb35c);color:var(--navy);cursor:pointer}.btn.green{background:linear-gradient(135deg,var(--green),#49c997);color:white}.btn.red{background:#ef4444;color:white}.match{border:1px solid #e2e8f0;border-radius:18px;padding:14px;margin:12px 0}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{background:#edf6ff;border-radius:999px;padding:7px 10px;font-weight:800}.correct{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:14px;padding:10px;margin:8px 0}.hidden{display:none}a{color:inherit}.mini{color:#64748b;font-size:13px}h2,h3{margin-top:0}@media(max-width:700px){.nav{display:block}.row{align-items:stretch}.btn{width:100%}}
</style></head><body><header class="top"><div class="nav"><div><span class="logo">M</span><b>Marina World Cup Admin</b></div><div><a href="index.html">Public</a> • <a href="winners.html">Past Winners</a></div></div></header><main class="wrap"><section class="card" id="login"><h2>Admin login</h2><p class="mini">Password is hidden from public pages.</p><input id="pass" type="password" placeholder="Password"><br><br><button class="btn" onclick="login()">Enter admin</button></section><section id="panel" class="hidden"><div id="configWarn" class="card" style="display:none;background:#fff7ed;color:#9a3412">Add Supabase URL and anon key inside admin.html, index.html, and winners.html.</div><section class="card"><h2>Add tonight game</h2><div class="grid"><input id="team1" placeholder="Team 1" value="Brazil"><input id="flag1" placeholder="Flag 1" value="🇧🇷"><input id="team2" placeholder="Team 2" value="Morocco"><input id="flag2" placeholder="Flag 2" value="🇲🇦"><input id="date" type="date" value="2026-06-14"><input id="kick" type="time" value="01:00"><input id="close" type="time" value="00:00"></div><br><button class="btn green" onclick="addGame()">Add game</button></section><section class="card"><h2>Tonight’s games control</h2><div id="games"></div></section></section></main><script>
const ADMIN_PASSWORD='Ahmed1234'; const SUPABASE_URL="https://ezyekchoqnihopvtgziz.supabase.co"; const SUPABASE_ANON_KEY="https://ezyekchoqnihopvtgziz.supabase.co";
const db = (SUPABASE_URL.includes('PASTE')) ? null : supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
function login(){if(pass.value===ADMIN_PASSWORD){login.classList?.add('hidden');document.getElementById('login').classList.add('hidden');panel.classList.remove('hidden');load()}else alert('Wrong password')}
async function addGame(){if(!db)return; const row={team1:team1.value,team2:team2.value,flag1:flag1.value,flag2:flag2.value,match_date:date.value,kickoff_time:kick.value,close_time:close.value,active:true}; const {error}=await db.from('games').insert(row); if(error)alert(error.message); else load()}
async function load(){if(!db){configWarn.style.display='block';return} const {data:g}=await db.from('games').select('*').order('match_date').order('kickoff_time'); const {data:p}=await db.from('predictions').select('*'); const {data:w}=await db.from('winners').select('*'); games.innerHTML=(g||[]).map(game=>{const preds=(p||[]).filter(x=>x.game_id===game.id); const correct=preds.filter(x=>x.pred1===game.score1 && x.pred2===game.score2 && game.score1!==null && game.score2!==null); const win=(w||[]).find(x=>x.game_id===game.id); return `<div class="match"><h3>${game.flag1} ${game.team1} vs ${game.flag2} ${game.team2}</h3><p class="mini">${game.match_date} • Kickoff ${game.kickoff_time} • closes ${game.close_time}</p><p><span class="pill">${preds.length} predictions</span> <span class="pill">${correct.length} correct</span></p><div class="row"><input id="r1${game.id}" type="number" placeholder="${game.team1} score" value="${game.score1??''}"><input id="r2${game.id}" type="number" placeholder="${game.team2} score" value="${game.score2??''}"><button class="btn green" onclick="saveResult('${game.id}')">Save result</button><button class="btn red" onclick="deleteGame('${game.id}')">Delete game</button></div><h4>Correct predictors</h4>${correct.map(c=>`<div class="correct">${c.full_name} • ${c.apartment_code} • ${c.phone} • predicted ${c.pred1}-${c.pred2}</div>`).join('')||'<p class="mini">No correct predictors yet.</p>'}<div class="card" style="background:#f8fafc"><h4>Choose / edit one winner</h4><div class="row"><button class="btn" onclick="randomWinner('${game.id}')">Random pick from correct</button><input id="wn${game.id}" placeholder="Winner name" value="${win?.winner_name||''}"><input id="wa${game.id}" placeholder="Apartment" value="${win?.apartment_code||''}"><input id="wp${game.id}" placeholder="What they got / prize" value="${win?.prize||''}"><button class="btn green" onclick="publishWinner('${game.id}')">Publish winner</button>${win?`<button class="btn red" onclick="deleteWinner('${win.id}')">Remove winner</button>`:''}</div></div></div>`}).join('')||'No games added yet.'}
async function saveResult(id){const {error}=await db.from('games').update({score1:+document.getElementById('r1'+id).value,score2:+document.getElementById('r2'+id).value}).eq('id',id); if(error)alert(error.message); else load()}
async function deleteGame(id){if(confirm('Delete this game and its predictions?')){await db.from('games').delete().eq('id',id);load()}}
async function randomWinner(id){const {data:game}=await db.from('games').select('*').eq('id',id).single(); const {data:preds}=await db.from('predictions').select('*').eq('game_id',id); const correct=(preds||[]).filter(x=>x.pred1===game.score1&&x.pred2===game.score2&&game.score1!==null); if(!correct.length)return alert('No correct predictors'); const c=correct[Math.floor(Math.random()*correct.length)]; document.getElementById('wn'+id).value=c.full_name; document.getElementById('wa'+id).value=c.apartment_code;}
async function publishWinner(id){const row={game_id:id,winner_name:document.getElementById('wn'+id).value,apartment_code:document.getElementById('wa'+id).value,prize:document.getElementById('wp'+id).value}; if(!row.winner_name)return alert('Add winner name'); await db.from('winners').upsert(row,{onConflict:'game_id'}); load()}
async function deleteWinner(id){await db.from('winners').delete().eq('id',id);load()}
if(db){db.channel('adminlive').on('postgres_changes',{event:'*',schema:'public'},load).subscribe();}
</script></body></html>
